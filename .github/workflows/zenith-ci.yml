# Zenith CI — lean per-push validation + packaging across the target distros.
#
# Fast builds run with --skip-cuda; full CUDA (NVENC) release builds will land in a
# separate release workflow with a cached CUDA runfile. The aarch64 Fedora job produces
# rpms that install on Asahi Linux (Fedora Remix) on Apple Silicon.
#
# Upstream LizardByte workflows are disabled in this fork; this file is Zenith's CI.

name: Zenith CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04 (deb, x86_64)
            runner: ubuntu-24.04
            container: ""
            sudo_flag: ""
            package: Sunshine.deb
            artifact: zenith-ubuntu-24.04-amd64.deb
          - name: Debian 13 trixie (deb, x86_64)
            runner: ubuntu-latest
            container: debian:13
            sudo_flag: "--sudo-off"
            package: Sunshine.deb
            artifact: zenith-debian-13-amd64.deb
          - name: Fedora 42 (rpm, x86_64)
            runner: ubuntu-latest
            container: fedora:42
            sudo_flag: "--sudo-off"
            package: Sunshine.rpm
            artifact: zenith-fedora-42-x86_64.rpm
          - name: Fedora 42 (rpm, aarch64 / Asahi)
            runner: ubuntu-24.04-arm
            container: fedora:42
            sudo_flag: "--sudo-off"
            package: Sunshine.rpm
            artifact: zenith-fedora-42-aarch64.rpm
    steps:
      - name: Install git (container jobs)
        if: matrix.container != ''
        shell: bash
        run: |
          if command -v dnf >/dev/null; then
            dnf install -y git
          else
            apt-get update && apt-get install -y git
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          chmod +x ./scripts/linux_build.sh
          ./scripts/linux_build.sh \
            ${{ matrix.sudo_flag }} \
            --skip-cuda \
            --publisher-name="jacksonpate" \
            --publisher-website="https://github.com/jacksonpate/zenith" \
            --publisher-issue-url="https://github.com/jacksonpate/zenith/issues"

      - name: Collect package
        shell: bash
        run: |
          mkdir -p artifacts
          cp ./build/cpack_artifacts/${{ matrix.package }} artifacts/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}
          if-no-files-found: error
